<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Power BI Practice Guide</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <div id="app-layout">
    <!-- Sidebar -->
    <aside id="sidebar">
      <div class="sidebar-header">
        <div class="sidebar-logo">
          <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
            <rect x="2" y="10" width="5" height="16" rx="1.5" fill="#F2C811"/>
            <rect x="9" y="6" width="5" height="20" rx="1.5" fill="#F2C811"/>
            <rect x="16" y="2" width="5" height="24" rx="1.5" fill="#F2C811"/>
            <rect x="23" y="8" width="5" height="18" rx="1.5" fill="#F2C811" opacity="0.5"/>
          </svg>
          <span class="sidebar-title">PBI Practice</span>
        </div>
        <button id="sidebar-close" class="sidebar-close" aria-label="Close sidebar">&times;</button>
      </div>
      <nav id="sidebar-nav" class="sidebar-nav"></nav>
      <div class="sidebar-footer">
        <a href="#home" class="sidebar-home-link">All Projects</a>
      </div>
    </aside>

    <!-- Main Content -->
    <main id="main-content">
      <header id="top-bar">
        <button id="menu-toggle" class="menu-toggle" aria-label="Toggle menu">
          <span></span><span></span><span></span>
        </button>
        <nav id="breadcrumb" class="breadcrumb"></nav>
      </header>

      <!-- Sticky Section Nav (visible in scenario pages) -->
      <nav id="section-nav" class="section-nav"></nav>

      <!-- Page Content -->
      <div id="page-content" class="page-content"></div>
    </main>
  </div>

  <!-- Drawer Overlay -->
  <div id="drawer-overlay" class="drawer-overlay"></div>

  <!-- Right Drawer (for DAX explanations) -->
  <aside id="drawer" class="drawer">
    <div class="drawer-header">
      <h3 id="drawer-title" class="drawer-title"></h3>
      <button id="drawer-close" class="drawer-close" aria-label="Close drawer">&times;</button>
    </div>
    <div id="drawer-body" class="drawer-body"></div>
  </aside>

  <!-- Scripts (order matters) -->
  <script src="js/dax-reference.js"></script>
  <script src="js/scenarios/_registry.js"></script>
  <script src="js/scenarios/retail-sales.js"></script>
  <script src="js/components.js"></script>
  <script src="js/charts.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
